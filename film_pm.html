<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRAME — 影片製作專案管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --bg: #0d0d0f;
  --bg2: #141416;
  --bg3: #1c1c20;
  --bg4: #242428;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0eee8;
  --text2: #9b9a95;
  --text3: #5a5957;
  --accent: #e8c97a;
  --accent2: #c9a84c;
  --accent-dim: rgba(232,201,122,0.12);
  --red: #e05252;
  --green: #52c97a;
  --blue: #5296e0;
  --purple: #9b7fe8;
  --teal: #52c9b4;
  --radius: 10px;
  --radius-lg: 16px;
  --panel-w: 400px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; }

/* LOGIN */
#login-screen {
  position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:1000;
}
.login-box {
  width:380px; background:var(--bg2); border:1px solid var(--border2); border-radius:var(--radius-lg); padding:48px 40px;
}
.login-logo { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; letter-spacing:-0.5px; color:var(--accent); margin-bottom:8px; }
.login-sub { font-size:13px; color:var(--text3); margin-bottom:36px; }
.login-box label { display:block; font-size:12px; color:var(--text2); letter-spacing:0.08em; margin-bottom:6px; }
.login-box input {
  width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); padding:10px 14px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; margin-bottom:16px; outline:none;
  transition:border-color 0.2s;
}
.login-box input:focus { border-color:var(--accent); }
.btn-login {
  width:100%; padding:12px; background:var(--accent); color:#1a1500; font-family:'Syne',sans-serif; font-weight:700;
  font-size:14px; border:none; border-radius:var(--radius); cursor:pointer; letter-spacing:0.05em;
  transition:background 0.2s, transform 0.1s;
}
.btn-login:hover { background:var(--accent2); }
.btn-login:active { transform:scale(0.98); }
.login-err { color:var(--red); font-size:12px; margin-top:-8px; margin-bottom:16px; display:none; }
.login-hint { font-size:11px; color:var(--text3); margin-top:16px; line-height:1.6; }

/* MAIN LAYOUT */
#app { display:none; height:100vh; overflow:hidden; }
.sidebar {
  width:220px; background:var(--bg2); border-right:1px solid var(--border); height:100vh;
  position:fixed; left:0; top:0; display:flex; flex-direction:column; z-index:100;
}
.logo { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; color:var(--accent); padding:24px 20px 20px; letter-spacing:-0.3px; }
.nav-section { font-size:10px; color:var(--text3); letter-spacing:0.1em; padding:0 20px 8px; }
.nav-item {
  display:flex; align-items:center; gap:10px; padding:9px 20px; font-size:13px; color:var(--text2);
  cursor:pointer; transition:all 0.15s; border-radius:0;
}
.nav-item i { font-size:14px; width:16px; }
.nav-item:hover { color:var(--text); background:var(--bg3); }
.nav-item.active { color:var(--accent); background:var(--accent-dim); }
.sidebar-bottom { margin-top:auto; padding:16px 20px; border-top:1px solid var(--border); }
.user-badge { display:flex; align-items:center; gap:10px; }
.user-avatar {
  width:32px; height:32px; border-radius:50%; background:var(--accent-dim); border:1px solid var(--accent);
  display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--accent); font-weight:700;
}
.user-name { font-size:13px; color:var(--text2); }
.btn-logout {
  background:none; border:none; color:var(--text3); cursor:pointer; font-size:12px; margin-top:8px;
  display:flex; align-items:center; gap:6px; padding:4px 0; transition:color 0.15s;
}
.btn-logout:hover { color:var(--red); }

/* MAIN CONTENT */
.main { margin-left:220px; height:100vh; overflow-y:auto; }
.topbar {
  display:flex; align-items:center; gap:16px; padding:20px 28px; border-bottom:1px solid var(--border);
  position:sticky; top:0; background:var(--bg); z-index:50;
}
.page-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; color:var(--text); flex:1; }
.filter-wrap { display:flex; gap:8px; }
.filter-btn {
  padding:6px 14px; border-radius:20px; border:1px solid var(--border); background:transparent;
  color:var(--text2); font-size:12px; cursor:pointer; transition:all 0.15s; font-family:'DM Sans',sans-serif;
}
.filter-btn:hover { border-color:var(--border2); color:var(--text); }
.filter-btn.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }
.btn-add {
  display:flex; align-items:center; gap:6px; padding:8px 16px; background:var(--accent); color:#1a1500;
  border:none; border-radius:var(--radius); font-family:'Syne',sans-serif; font-weight:700; font-size:12px;
  cursor:pointer; transition:all 0.15s; letter-spacing:0.05em;
}
.btn-add:hover { background:var(--accent2); }

/* STATS */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; padding:24px 28px 0; }
.stat-card {
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px;
  transition:border-color 0.2s;
}
.stat-card:hover { border-color:var(--border2); }
.stat-label { font-size:11px; color:var(--text3); letter-spacing:0.08em; margin-bottom:8px; }
.stat-val { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; color:var(--text); }
.stat-sub { font-size:11px; color:var(--text3); margin-top:4px; }

/* TYPE TABS */
.type-tabs { display:flex; gap:0; padding:20px 28px 0; border-bottom:1px solid var(--border); }
.type-tab {
  padding:8px 18px; font-size:12px; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent;
  transition:all 0.15s; font-family:'Syne',sans-serif; font-weight:600; letter-spacing:0.05em;
}
.type-tab.active { color:var(--accent); border-bottom-color:var(--accent); }

/* PROJECT GRID */
.projects-wrap { padding:20px 28px; }
.projects-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
.project-card {
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px;
  cursor:pointer; transition:all 0.2s; position:relative;
}
.project-card:hover { border-color:var(--border2); transform:translateY(-1px); }
.project-card.selected { border-color:var(--accent); }
.card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px; }
.card-type { font-size:10px; color:var(--text3); letter-spacing:0.1em; font-family:'Syne',sans-serif; margin-bottom:4px; }
.card-name { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; color:var(--text); }
.card-client { font-size:12px; color:var(--text2); margin-top:2px; }
.status-pill {
  padding:3px 10px; border-radius:20px; font-size:10px; font-weight:600; letter-spacing:0.05em; white-space:nowrap;
}
.status-proposal { background:rgba(90,90,150,0.2); color:#9b9bdd; }
.status-preproduction { background:rgba(82,150,224,0.15); color:#5296e0; }
.status-production { background:rgba(232,201,122,0.15); color:#e8c97a; }
.status-postproduction { background:rgba(155,127,232,0.15); color:#9b7fe8; }
.status-completed { background:rgba(82,201,122,0.15); color:#52c97a; }
.card-info { display:flex; gap:16px; margin:12px 0; }
.card-info-item { font-size:11px; color:var(--text3); display:flex; align-items:center; gap:4px; }
.card-info-item i { font-size:11px; }
.progress-bar { height:3px; background:var(--bg4); border-radius:2px; overflow:hidden; margin-top:12px; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:2px; transition:width 0.4s; }
.card-progress-text { display:flex; justify-content:space-between; margin-top:6px; }
.card-progress-text span { font-size:10px; color:var(--text3); }
.btn-del-card {
  position:absolute; bottom:12px; right:12px; background:none; border:none; color:var(--text3);
  cursor:pointer; font-size:12px; padding:4px 6px; border-radius:6px; transition:all 0.15s; display:none;
}
.project-card:hover .btn-del-card { display:block; }
.btn-del-card:hover { color:var(--red); background:rgba(224,82,82,0.1); }

/* GANTT */
.gantt-wrap { padding:20px 28px; }
.gantt-header { display:flex; gap:8px; margin-bottom:16px; overflow-x:auto; }
.gantt-month { font-size:10px; color:var(--text3); letter-spacing:0.08em; }
.gantt-row { display:flex; align-items:center; gap:0; height:40px; border-bottom:1px solid var(--border); }
.gantt-label { width:200px; min-width:200px; font-size:12px; color:var(--text2); padding-right:16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.gantt-track { flex:1; position:relative; height:100%; }
.gantt-bar {
  position:absolute; height:20px; top:50%; transform:translateY(-50%); border-radius:4px;
  display:flex; align-items:center; padding:0 8px; font-size:10px; color:#1a1500; font-weight:600;
  cursor:pointer; transition:opacity 0.15s;
}
.gantt-bar:hover { opacity:0.85; }
.gantt-months-header { display:flex; margin-left:200px; border-bottom:1px solid var(--border); margin-bottom:0; }
.gantt-month-col { flex:1; text-align:center; font-size:10px; color:var(--text3); letter-spacing:0.08em; padding:6px 0; }

/* SIDE PANEL */
.side-panel {
  position:fixed; top:0; right:0; width:var(--panel-w); height:100vh; background:var(--bg2);
  border-left:1px solid var(--border); transform:translateX(100%); transition:transform 0.3s cubic-bezier(.25,.8,.25,1);
  z-index:200; display:flex; flex-direction:column; overflow:hidden;
}
.side-panel.open { transform:translateX(0); }
.panel-header {
  padding:20px 20px 0; border-bottom:1px solid var(--border); flex-shrink:0;
}
.panel-close {
  position:absolute; top:16px; right:16px; background:none; border:none; color:var(--text2);
  cursor:pointer; font-size:16px; padding:4px; border-radius:6px; transition:color 0.15s;
}
.panel-close:hover { color:var(--text); }
.panel-project-name { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; padding-right:32px; margin-bottom:4px; }
.panel-project-meta { font-size:12px; color:var(--text2); margin-bottom:12px; }
.panel-tabs { display:flex; gap:0; }
.panel-tab {
  padding:8px 14px; font-size:12px; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent;
  transition:all 0.15s; font-family:'Syne',sans-serif; font-weight:600;
}
.panel-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.panel-body { flex:1; overflow-y:auto; padding:20px; }

/* STAGES */
.stage-block { margin-bottom:20px; }
.stage-header {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;
  padding-bottom:8px; border-bottom:1px solid var(--border);
}
.stage-name-wrap { display:flex; align-items:center; gap:8px; }
.stage-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.stage-name { font-family:'Syne',sans-serif; font-size:13px; font-weight:600; color:var(--text); }
.stage-progress-mini { font-size:11px; color:var(--text3); }
.btn-stage-actions { display:flex; gap:4px; }
.btn-icon {
  background:none; border:none; color:var(--text3); cursor:pointer; font-size:12px; padding:4px 6px;
  border-radius:6px; transition:all 0.15s;
}
.btn-icon:hover { color:var(--text); background:var(--bg3); }
.btn-icon.danger:hover { color:var(--red); background:rgba(224,82,82,0.1); }
.task-item {
  display:flex; align-items:center; gap:10px; padding:6px 8px; border-radius:8px;
  transition:background 0.15s; cursor:default;
}
.task-item:hover { background:var(--bg3); }
.task-cb {
  width:16px; height:16px; border-radius:4px; border:1px solid var(--border2); background:transparent;
  display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
  transition:all 0.15s;
}
.task-cb.checked { background:var(--accent); border-color:var(--accent); }
.task-cb.checked i { display:block; }
.task-cb i { display:none; font-size:10px; color:#1a1500; }
.task-name { font-size:12px; color:var(--text); flex:1; }
.task-name.done { color:var(--text3); text-decoration:line-through; }
.btn-del-task { background:none; border:none; color:var(--text3); cursor:pointer; font-size:11px; padding:2px 4px; border-radius:4px; transition:all 0.15s; opacity:0; }
.task-item:hover .btn-del-task { opacity:1; }
.btn-del-task:hover { color:var(--red); }
.add-task-row { display:flex; gap:6px; margin-top:6px; }
.add-task-input {
  flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:7px 10px;
  color:var(--text); font-size:12px; font-family:'DM Sans',sans-serif; outline:none;
  transition:border-color 0.2s;
}
.add-task-input:focus { border-color:var(--accent); }
.btn-add-task {
  padding:7px 12px; background:var(--accent-dim); border:1px solid var(--accent); border-radius:8px;
  color:var(--accent); font-size:12px; cursor:pointer; transition:all 0.15s;
}
.btn-add-task:hover { background:var(--accent); color:#1a1500; }
.btn-add-stage {
  width:100%; padding:10px; border:1px dashed var(--border2); border-radius:var(--radius); background:none;
  color:var(--text3); font-size:12px; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:6px; justify-content:center;
}
.btn-add-stage:hover { border-color:var(--accent); color:var(--accent); }

/* PROJECT INFO TAB */
.info-field { margin-bottom:16px; }
.info-label { font-size:11px; color:var(--text3); letter-spacing:0.08em; margin-bottom:4px; }
.info-val { font-size:14px; color:var(--text); }
.info-input {
  width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:8px 12px;
  color:var(--text); font-size:13px; font-family:'DM Sans',sans-serif; outline:none; transition:border-color 0.2s;
}
.info-input:focus { border-color:var(--accent); }
.info-select {
  width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:8px 12px;
  color:var(--text); font-size:13px; font-family:'DM Sans',sans-serif; outline:none; cursor:pointer;
}
.btn-edit, .btn-save {
  padding:8px 16px; border-radius:var(--radius); font-family:'Syne',sans-serif; font-weight:700;
  font-size:12px; cursor:pointer; transition:all 0.15s; letter-spacing:0.05em;
}
.btn-edit { background:var(--bg3); border:1px solid var(--border2); color:var(--text); }
.btn-edit:hover { border-color:var(--accent); color:var(--accent); }
.btn-save { background:var(--accent); border:none; color:#1a1500; }
.btn-save:hover { background:var(--accent2); }
.btn-del-project {
  width:100%; margin-top:20px; padding:10px; background:rgba(224,82,82,0.08); border:1px solid rgba(224,82,82,0.2);
  border-radius:var(--radius); color:var(--red); font-size:12px; cursor:pointer; transition:all 0.15s;
  font-family:'Syne',sans-serif; font-weight:600;
}
.btn-del-project:hover { background:rgba(224,82,82,0.15); }

/* MODAL */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:500; display:none; align-items:center; justify-content:center;
}
.modal-overlay.show { display:flex; }
.modal {
  width:480px; background:var(--bg2); border:1px solid var(--border2); border-radius:var(--radius-lg);
  padding:32px; max-height:90vh; overflow-y:auto;
}
.modal-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; margin-bottom:24px; color:var(--text); }
.modal-field { margin-bottom:16px; }
.modal-field label { display:block; font-size:11px; color:var(--text3); letter-spacing:0.08em; margin-bottom:6px; }
.modal-field input, .modal-field select, .modal-field textarea {
  width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); padding:10px 14px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; outline:none; transition:border-color 0.2s;
}
.modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus { border-color:var(--accent); }
.modal-field select { cursor:pointer; }
.modal-field textarea { resize:vertical; min-height:80px; }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:24px; }
.btn-cancel {
  padding:10px 20px; background:none; border:1px solid var(--border); border-radius:var(--radius);
  color:var(--text2); cursor:pointer; font-family:'Syne',sans-serif; font-size:12px; transition:all 0.15s;
}
.btn-cancel:hover { border-color:var(--border2); color:var(--text); }
.btn-confirm {
  padding:10px 20px; background:var(--accent); border:none; border-radius:var(--radius);
  color:#1a1500; cursor:pointer; font-family:'Syne',sans-serif; font-weight:700; font-size:12px;
}
.btn-confirm:hover { background:var(--accent2); }
.btn-confirm-danger {
  padding:10px 20px; background:var(--red); border:none; border-radius:var(--radius);
  color:#fff; cursor:pointer; font-family:'Syne',sans-serif; font-weight:700; font-size:12px;
}

/* CONFIRM DIALOG */
.confirm-dialog {
  width:360px; background:var(--bg2); border:1px solid var(--border2); border-radius:var(--radius-lg); padding:28px;
}
.confirm-title { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; margin-bottom:10px; }
.confirm-msg { font-size:13px; color:var(--text2); margin-bottom:24px; line-height:1.6; }

/* EMPTY STATE */
.empty-state { text-align:center; padding:60px 20px; }
.empty-icon { font-size:40px; color:var(--text3); margin-bottom:16px; }
.empty-text { font-size:14px; color:var(--text3); }

/* SCROLLBAR */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--border2); }

/* VIEWS */
.view { display:none; }
.view.active { display:block; }

.stage-colors { --c0:#e8c97a; --c1:#5296e0; --c2:#9b7fe8; --c3:#52c9b4; --c4:#e05252; --c5:#52c97a; }
</style>
</head>
<body class="stage-colors">

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">FRAME</div>
    <div class="login-sub">影片製作專案管理系統</div>
    <label>帳號</label>
    <input type="text" id="login-user" placeholder="輸入帳號">
    <label>密碼</label>
    <input type="password" id="login-pass" placeholder="輸入密碼">
    <div class="login-err" id="login-err">帳號或密碼錯誤，請重試。</div>
    <button class="btn-login" onclick="doLogin()">登入</button>
    <div class="login-hint">測試帳號：admin / admin123　或　demo / demo123</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="sidebar">
    <div class="logo">FRAME</div>
    <div style="padding:0 0 8px; flex:1;">
      <div class="nav-section">主選單</div>
      <div class="nav-item active" onclick="setView('dashboard')" id="nav-dashboard">
        <i class="fa fa-chart-pie"></i> 儀表板
      </div>
      <div class="nav-item" onclick="setView('projects')" id="nav-projects">
        <i class="fa fa-film"></i> 所有專案
      </div>
      <div class="nav-item" onclick="setView('gantt')" id="nav-gantt">
        <i class="fa fa-bars-progress"></i> 甘特圖
      </div>
    </div>
    <div class="sidebar-bottom">
      <div class="user-badge">
        <div class="user-avatar" id="user-avatar">A</div>
        <div class="user-name" id="user-name">admin</div>
      </div>
      <button class="btn-logout" onclick="doLogout()"><i class="fa fa-right-from-bracket"></i> 登出</button>
    </div>
  </div>

  <div class="main">
    <!-- DASHBOARD -->
    <div class="view active" id="view-dashboard">
      <div class="topbar">
        <div class="page-title">儀表板</div>
      </div>
      <div class="stats-row" id="stats-row"></div>
      <div style="padding:24px 28px 0;">
        <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:var(--text2);letter-spacing:0.08em;margin-bottom:16px;">近期專案</div>
      </div>
      <div style="padding:0 28px 28px;" id="recent-projects"></div>
    </div>

    <!-- PROJECTS -->
    <div class="view" id="view-projects">
      <div class="topbar">
        <div class="page-title">所有專案</div>
        <div class="filter-wrap" id="status-filters"></div>
        <button class="btn-add" onclick="openAddModal()"><i class="fa fa-plus"></i> 新增提案</button>
      </div>
      <div class="type-tabs" id="type-tabs"></div>
      <div class="projects-wrap">
        <div class="projects-grid" id="projects-grid"></div>
      </div>
    </div>

    <!-- GANTT -->
    <div class="view" id="view-gantt">
      <div class="topbar">
        <div class="page-title">時間進程視圖</div>
      </div>
      <div class="gantt-wrap" id="gantt-wrap"></div>
    </div>
  </div>
</div>

<!-- SIDE PANEL -->
<div class="side-panel" id="side-panel">
  <div class="panel-header">
    <button class="panel-close" onclick="closePanel()"><i class="fa fa-xmark"></i></button>
    <div class="panel-project-name" id="panel-name"></div>
    <div class="panel-project-meta" id="panel-meta"></div>
    <div class="panel-tabs">
      <div class="panel-tab active" onclick="setPanelTab('stages')" id="ptab-stages">階段任務</div>
      <div class="panel-tab" onclick="setPanelTab('info')" id="ptab-info">專案資訊</div>
    </div>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-title">新增提案</div>
    <div class="modal-field"><label>專案名稱 *</label><input id="m-name" type="text" placeholder="例：2024 品牌形象影片"></div>
    <div class="modal-field"><label>影片類型 *</label>
      <select id="m-type">
        <option value="廣告">廣告</option>
        <option value="紀錄片">紀錄片</option>
        <option value="品牌影片">品牌影片</option>
        <option value="活動紀錄">活動紀錄</option>
      </select>
    </div>
    <div class="modal-field"><label>客戶</label><input id="m-client" type="text" placeholder="客戶名稱"></div>
    <div class="modal-field"><label>導演</label><input id="m-director" type="text" placeholder="導演姓名"></div>
    <div style="display:flex;gap:12px;">
      <div class="modal-field" style="flex:1;"><label>開始日期</label><input id="m-start" type="date"></div>
      <div class="modal-field" style="flex:1;"><label>結束日期</label><input id="m-end" type="date"></div>
    </div>
    <div class="modal-field"><label>說明</label><textarea id="m-desc" placeholder="專案說明、備註..."></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">取消</button>
      <button class="btn-confirm" onclick="addProject()">新增提案</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirm-modal">
  <div class="confirm-dialog">
    <div class="confirm-title" id="confirm-title">確認刪除</div>
    <div class="confirm-msg" id="confirm-msg">此操作無法復原，確定要繼續嗎？</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeConfirm()">取消</button>
      <button class="btn-confirm-danger" id="confirm-ok">確定刪除</button>
    </div>
  </div>
</div>

<script>
const ACCOUNTS = { admin:'admin123', demo:'demo123' };
const STATUSES = ['提案中','前製','拍攝中','後製','已完成'];
const TYPES = ['全部','廣告','紀錄片','品牌影片','活動紀錄'];
const STAGE_DEFAULTS = {
  '提案':['腳本初稿','提案報告','預算估算','客戶確認'],
  '前製':['選角/演員溝通','勘景/場地確認','設備租借','拍攝計畫表'],
  '拍攝':['主場景拍攝','補拍素材','空拍/B-Roll','素材整理備份'],
  '後製':['粗剪初版','配樂音效','調色','字幕/特效','客戶審片','交付']
};
const STATUS_MAP = { '提案中':'proposal','前製':'preproduction','拍攝中':'production','後製':'postproduction','已完成':'completed' };
const STAGE_COLORS = ['#e8c97a','#5296e0','#9b7fe8','#52c9b4'];

let currentUser = null;
let projects = [];
let selectedId = null;
let currentView = 'dashboard';
let panelTab = 'stages';
let filterStatus = '全部';
let filterType = '全部';
let confirmCallback = null;

// STORAGE
async function loadData() {
  try {
    const r = await window.storage.get('frame-projects');
    if (r) projects = JSON.parse(r.value);
  } catch(e) { projects = getSampleData(); await saveData(); }
}
async function saveData() {
  try { await window.storage.set('frame-projects', JSON.stringify(projects)); } catch(e) {}
}

function getSampleData() {
  const today = new Date();
  const y = today.getFullYear(), m = today.getMonth();
  const d = (offset) => {
    const dt = new Date(y, m, today.getDate() + offset);
    return dt.toISOString().split('T')[0];
  };
  return [
    makeProject('品牌識別重塑影片','品牌影片','科技啟程 TechStart','陳浩然',d(-20),d(25),'為科技新創公司打造品牌識別影片系列','前製'),
    makeProject('夏季新品廣告','廣告','日本城生活百貨','林怡辰',d(-5),d(30),'30 秒電視廣告及 15 秒社群版本','拍攝中'),
    makeProject('創辦人紀錄片','紀錄片','誠信建設','吳承恩',d(-60),d(-5),'記錄創辦人 30 年創業歷程','後製'),
    makeProject('年度尾牙活動紀錄','活動紀錄','群創光電','許振豪',d(5),d(20),'公司年度尾牙全程記錄','提案中'),
  ];
}

function makeProject(name,type,client,director,start,end,desc,status='提案中') {
  const stages = Object.entries(STAGE_DEFAULTS).map(([sname,tasks])=>({
    id: uid(), name: sname,
    tasks: tasks.map(t=>({ id:uid(), name:t, done: Math.random()>0.6 }))
  }));
  return { id:uid(), name, type, client, director, start, end, desc, status, stages, createdAt:Date.now() };
}

function uid() { return Math.random().toString(36).slice(2,10); }

// LOGIN
function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  if (ACCOUNTS[u] && ACCOUNTS[u] === p) {
    currentUser = u;
    err.style.display = 'none';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('user-name').textContent = u;
    document.getElementById('user-avatar').textContent = u[0].toUpperCase();
    render();
  } else {
    err.style.display = 'block';
  }
}
document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function doLogout() {
  currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  closePanel();
}

// VIEW
function setView(v) {
  currentView = v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-'+v).classList.add('active');
  render();
}

function render() {
  renderStats();
  if (currentView === 'dashboard') renderDashboard();
  if (currentView === 'projects') renderProjects();
  if (currentView === 'gantt') renderGantt();
  if (selectedId) renderPanel();
}

// STATS
function calcProgress(p) {
  let total=0, done=0;
  p.stages.forEach(s => s.tasks.forEach(t => { total++; if(t.done) done++; }));
  return total ? Math.round(done/total*100) : 0;
}

function renderStats() {
  const total = projects.length;
  const active = projects.filter(p=>p.status!=='已完成').length;
  const completed = projects.filter(p=>p.status==='已完成').length;
  const rate = total ? Math.round(completed/total*100) : 0;
  const now = new Date();
  const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
  const thisWeek = projects.filter(p => {
    if (!p.start) return false;
    const s = new Date(p.start);
    return s >= weekStart && s <= now;
  }).length;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-label">TOTAL PROJECTS</div><div class="stat-val">${total}</div><div class="stat-sub">所有專案</div></div>
    <div class="stat-card"><div class="stat-label">IN PROGRESS</div><div class="stat-val">${active}</div><div class="stat-sub">進行中</div></div>
    <div class="stat-card"><div class="stat-label">THIS WEEK</div><div class="stat-val">${thisWeek}</div><div class="stat-sub">本週開始</div></div>
    <div class="stat-card"><div class="stat-label">COMPLETION</div><div class="stat-val">${rate}%</div><div class="stat-sub">完成率</div></div>
  `;
}

function renderDashboard() {
  const sorted = [...projects].sort((a,b)=>b.createdAt-a.createdAt).slice(0,6);
  const grid = document.getElementById('recent-projects');
  if (!sorted.length) { grid.innerHTML = '<div class="empty-state"><div class="empty-icon"><i class="fa fa-film"></i></div><div class="empty-text">尚無專案，點選「所有專案」新增提案</div></div>'; return; }
  grid.innerHTML = `<div class="projects-grid">${sorted.map(p=>projectCard(p)).join('')}</div>`;
}

function renderProjects() {
  // Status filters
  const sf = document.getElementById('status-filters');
  sf.innerHTML = ['全部',...STATUSES].map(s=>`<button class="filter-btn${filterStatus===s?' active':''}" onclick="setFilter('${s}')">${s}</button>`).join('');
  // Type tabs
  const tt = document.getElementById('type-tabs');
  tt.innerHTML = TYPES.map(t=>`<div class="type-tab${filterType===t?' active':''}" onclick="setType('${t}')">${t}</div>`).join('');
  // Grid
  let filtered = projects;
  if (filterStatus!=='全部') filtered = filtered.filter(p=>p.status===filterStatus);
  if (filterType!=='全部') filtered = filtered.filter(p=>p.type===filterType);
  const grid = document.getElementById('projects-grid');
  if (!filtered.length) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon"><i class="fa fa-magnifying-glass"></i></div><div class="empty-text">沒有符合條件的專案</div></div>'; return; }
  grid.innerHTML = filtered.map(p=>projectCard(p)).join('');
}

function projectCard(p) {
  const prog = calcProgress(p);
  const sc = STATUS_MAP[p.status]||'proposal';
  const sel = selectedId===p.id;
  return `<div class="project-card${sel?' selected':''}" onclick="openPanel('${p.id}')">
    <div class="card-top">
      <div>
        <div class="card-type">${p.type.toUpperCase()}</div>
        <div class="card-name">${esc(p.name)}</div>
        <div class="card-client">${esc(p.client||'—')}</div>
      </div>
      <div class="status-pill status-${sc}">${p.status}</div>
    </div>
    <div class="card-info">
      ${p.director?`<div class="card-info-item"><i class="fa fa-user"></i>${esc(p.director)}</div>`:''}
      ${p.start?`<div class="card-info-item"><i class="fa fa-calendar"></i>${p.start}</div>`:''}
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
    <div class="card-progress-text"><span>任務完成</span><span>${prog}%</span></div>
    <button class="btn-del-card" onclick="event.stopPropagation();confirmDelete('${p.id}','card')"><i class="fa fa-trash"></i></button>
  </div>`;
}

function setFilter(s) { filterStatus = s; renderProjects(); }
function setType(t) { filterType = t; renderProjects(); }

// GANTT
function renderGantt() {
  const wrap = document.getElementById('gantt-wrap');
  if (!projects.length) { wrap.innerHTML = '<div class="empty-state"><div class="empty-icon"><i class="fa fa-bars-progress"></i></div><div class="empty-text">尚無專案可顯示</div></div>'; return; }
  const allDates = projects.filter(p=>p.start&&p.end).flatMap(p=>[new Date(p.start),new Date(p.end)]);
  if (!allDates.length) { wrap.innerHTML = '<div style="padding:20px;color:var(--text3);font-size:13px;">請為專案設定開始與結束日期以顯示甘特圖。</div>'; return; }
  const minD = new Date(Math.min(...allDates)); minD.setDate(1);
  const maxD = new Date(Math.max(...allDates)); maxD.setMonth(maxD.getMonth()+1); maxD.setDate(1);
  const totalMs = maxD - minD;
  const months = [];
  let cur = new Date(minD);
  while (cur < maxD) {
    months.push(new Date(cur));
    cur.setMonth(cur.getMonth()+1);
  }
  const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  let html = `<div style="display:flex;margin-left:200px;border-bottom:1px solid var(--border);margin-bottom:0;">`;
  months.forEach(m => { html += `<div class="gantt-month-col">${monthNames[m.getMonth()]}</div>`; });
  html += `</div>`;
  projects.filter(p=>p.start&&p.end).forEach((p,i) => {
    const s = new Date(p.start), e = new Date(p.end);
    const left = Math.max(0,(s-minD)/totalMs*100);
    const width = Math.max(2,(e-s)/totalMs*100);
    const colors = ['#e8c97a','#5296e0','#9b7fe8','#52c9b4','#e05252','#52c97a'];
    const c = colors[i%colors.length];
    html += `<div class="gantt-row">
      <div class="gantt-label" title="${esc(p.name)}">${esc(p.name)}</div>
      <div class="gantt-track">
        <div class="gantt-bar" style="left:${left}%;width:${width}%;background:${c};" title="${p.start} ～ ${p.end}" onclick="openPanel('${p.id}')">
          <span style="overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:100%;font-size:10px;">${esc(p.name)}</span>
        </div>
      </div>
    </div>`;
  });
  wrap.innerHTML = html;
}

// PANEL
function openPanel(id) {
  selectedId = id;
  document.getElementById('side-panel').classList.add('open');
  panelTab = 'stages';
  renderPanel();
  if (currentView === 'projects') renderProjects();
  if (currentView === 'dashboard') renderDashboard();
}
function closePanel() {
  selectedId = null;
  document.getElementById('side-panel').classList.remove('open');
  if (currentView === 'projects') renderProjects();
  if (currentView === 'dashboard') renderDashboard();
}
function setPanelTab(t) {
  panelTab = t;
  document.querySelectorAll('.panel-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('ptab-'+t).classList.add('active');
  renderPanel();
}

function renderPanel() {
  const p = projects.find(x=>x.id===selectedId);
  if (!p) return;
  document.getElementById('panel-name').textContent = p.name;
  document.getElementById('panel-meta').textContent = `${p.type} · ${p.client||'—'} · ${p.status}`;
  if (panelTab === 'stages') renderPanelStages(p);
  else renderPanelInfo(p);
}

function renderPanelStages(p) {
  let html = '';
  p.stages.forEach((stage, si) => {
    const total = stage.tasks.length, done = stage.tasks.filter(t=>t.done).length;
    const c = STAGE_COLORS[si%STAGE_COLORS.length];
    html += `<div class="stage-block">
      <div class="stage-header">
        <div class="stage-name-wrap">
          <div class="stage-dot" style="background:${c}"></div>
          <span class="stage-name">${esc(stage.name)}</span>
          <span class="stage-progress-mini">${done}/${total}</span>
        </div>
        <div class="btn-stage-actions">
          <button class="btn-icon danger" title="刪除階段" onclick="deleteStage('${p.id}','${stage.id}')"><i class="fa fa-trash"></i></button>
        </div>
      </div>`;
    stage.tasks.forEach(task => {
      html += `<div class="task-item">
        <div class="task-cb${task.done?' checked':''}" onclick="toggleTask('${p.id}','${stage.id}','${task.id}')">
          <i class="fa fa-check"></i>
        </div>
        <div class="task-name${task.done?' done':''}">${esc(task.name)}</div>
        <button class="btn-del-task" onclick="deleteTask('${p.id}','${stage.id}','${task.id}')"><i class="fa fa-xmark"></i></button>
      </div>`;
    });
    html += `<div class="add-task-row">
      <input class="add-task-input" id="ti-${stage.id}" placeholder="新增任務..." onkeydown="if(event.key==='Enter')addTask('${p.id}','${stage.id}')">
      <button class="btn-add-task" onclick="addTask('${p.id}','${stage.id}')"><i class="fa fa-plus"></i></button>
    </div></div>`;
  });
  html += `<button class="btn-add-stage" onclick="addStage('${p.id}')"><i class="fa fa-plus"></i> 新增階段</button>`;
  document.getElementById('panel-body').innerHTML = html;
}

function renderPanelInfo(p) {
  const editing = p._editing;
  let html = '';
  if (editing) {
    html = `
      <div class="info-field"><div class="info-label">專案名稱</div><input class="info-input" id="ei-name" value="${esc(p.name)}"></div>
      <div class="info-field"><div class="info-label">影片類型</div>
        <select class="info-select" id="ei-type">
          ${['廣告','紀錄片','品牌影片','活動紀錄'].map(t=>`<option${p.type===t?' selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="info-field"><div class="info-label">客戶</div><input class="info-input" id="ei-client" value="${esc(p.client||'')}"></div>
      <div class="info-field"><div class="info-label">導演</div><input class="info-input" id="ei-director" value="${esc(p.director||'')}"></div>
      <div class="info-field"><div class="info-label">狀態</div>
        <select class="info-select" id="ei-status">
          ${STATUSES.map(s=>`<option${p.status===s?' selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;gap:10px;">
        <div class="info-field" style="flex:1;"><div class="info-label">開始日期</div><input class="info-input" type="date" id="ei-start" value="${p.start||''}"></div>
        <div class="info-field" style="flex:1;"><div class="info-label">結束日期</div><input class="info-input" type="date" id="ei-end" value="${p.end||''}"></div>
      </div>
      <div class="info-field"><div class="info-label">說明</div><textarea class="info-input" id="ei-desc" rows="4">${esc(p.desc||'')}</textarea></div>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn-cancel" onclick="cancelEdit('${p.id}')">取消</button>
        <button class="btn-save" onclick="saveEdit('${p.id}')">儲存</button>
      </div>`;
  } else {
    const fields = [
      ['影片類型', p.type],['客戶', p.client||'—'],['導演', p.director||'—'],
      ['狀態', p.status],['開始日期', p.start||'—'],['結束日期', p.end||'—'],
      ['說明', p.desc||'—']
    ];
    html = fields.map(([l,v])=>`<div class="info-field"><div class="info-label">${l}</div><div class="info-val">${esc(v)}</div></div>`).join('');
    html += `<button class="btn-edit" onclick="startEdit('${p.id}')"><i class="fa fa-pencil"></i> 編輯</button>`;
    html += `<button class="btn-del-project" onclick="confirmDelete('${p.id}','panel')">刪除此專案</button>`;
  }
  document.getElementById('panel-body').innerHTML = html;
}

function startEdit(id) {
  const p = projects.find(x=>x.id===id); if(!p) return;
  p._editing = true; renderPanelInfo(p);
}
function cancelEdit(id) {
  const p = projects.find(x=>x.id===id); if(!p) return;
  delete p._editing; renderPanelInfo(p);
}
async function saveEdit(id) {
  const p = projects.find(x=>x.id===id); if(!p) return;
  p.name = document.getElementById('ei-name').value.trim()||p.name;
  p.type = document.getElementById('ei-type').value;
  p.client = document.getElementById('ei-client').value.trim();
  p.director = document.getElementById('ei-director').value.trim();
  p.status = document.getElementById('ei-status').value;
  p.start = document.getElementById('ei-start').value;
  p.end = document.getElementById('ei-end').value;
  p.desc = document.getElementById('ei-desc').value.trim();
  delete p._editing;
  await saveData(); render();
}

// TASKS / STAGES
async function toggleTask(pid, sid, tid) {
  const p = projects.find(x=>x.id===pid); if(!p) return;
  const s = p.stages.find(x=>x.id===sid); if(!s) return;
  const t = s.tasks.find(x=>x.id===tid); if(!t) return;
  t.done = !t.done;
  await saveData(); render();
}
async function deleteTask(pid, sid, tid) {
  const p = projects.find(x=>x.id===pid); if(!p) return;
  const s = p.stages.find(x=>x.id===sid); if(!s) return;
  s.tasks = s.tasks.filter(x=>x.id!==tid);
  await saveData(); render();
}
async function addTask(pid, sid) {
  const input = document.getElementById('ti-'+sid); if(!input) return;
  const name = input.value.trim(); if(!name) return;
  const p = projects.find(x=>x.id===pid); if(!p) return;
  const s = p.stages.find(x=>x.id===sid); if(!s) return;
  s.tasks.push({ id:uid(), name, done:false });
  await saveData(); render();
}
async function deleteStage(pid, sid) {
  const p = projects.find(x=>x.id===pid); if(!p) return;
  p.stages = p.stages.filter(x=>x.id!==sid);
  await saveData(); render();
}
async function addStage(pid) {
  const name = prompt('新階段名稱：'); if(!name) return;
  const p = projects.find(x=>x.id===pid); if(!p) return;
  p.stages.push({ id:uid(), name:name.trim(), tasks:[] });
  await saveData(); render();
}

// ADD PROJECT
function openAddModal() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('m-name').value='';
  document.getElementById('m-client').value='';
  document.getElementById('m-director').value='';
  document.getElementById('m-desc').value='';
  document.getElementById('m-start').value=today;
  document.getElementById('m-end').value='';
  document.getElementById('add-modal').classList.add('show');
  setTimeout(()=>document.getElementById('m-name').focus(),100);
}
function closeAddModal() { document.getElementById('add-modal').classList.remove('show'); }
async function addProject() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { document.getElementById('m-name').focus(); return; }
  const p = makeProject(
    name,
    document.getElementById('m-type').value,
    document.getElementById('m-client').value.trim(),
    document.getElementById('m-director').value.trim(),
    document.getElementById('m-start').value,
    document.getElementById('m-end').value,
    document.getElementById('m-desc').value.trim()
  );
  p.stages = Object.entries(STAGE_DEFAULTS).map(([sname,tasks])=>({
    id:uid(), name:sname, tasks:tasks.map(t=>({id:uid(),name:t,done:false}))
  }));
  projects.unshift(p);
  await saveData();
  closeAddModal();
  render();
}

// DELETE
function confirmDelete(id, context) {
  const p = projects.find(x=>x.id===id); if(!p) return;
  document.getElementById('confirm-title').textContent = '確認刪除專案';
  document.getElementById('confirm-msg').textContent = `「${p.name}」將被永久刪除，此操作無法復原。`;
  document.getElementById('confirm-ok').onclick = async () => {
    projects = projects.filter(x=>x.id!==id);
    if (selectedId === id) { selectedId=null; document.getElementById('side-panel').classList.remove('open'); }
    await saveData(); closeConfirm(); render();
  };
  document.getElementById('confirm-modal').classList.add('show');
}
function closeConfirm() { document.getElementById('confirm-modal').classList.remove('show'); }

document.getElementById('add-modal').addEventListener('click', e=>{ if(e.target===document.getElementById('add-modal')) closeAddModal(); });
document.getElementById('confirm-modal').addEventListener('click', e=>{ if(e.target===document.getElementById('confirm-modal')) closeConfirm(); });

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// INIT
(async function() {
  await loadData();
})();
</script>
