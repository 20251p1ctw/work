<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRAME 影片拍攝專案管理系統</title>

  <!-- React CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0d0d0d;
      color: #e8e4dc;
      font-family: 'DM Mono', 'Noto Serif TC', monospace;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #2a2a2a;
      border-radius: 2px;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideIn {
      from {
        transform: translateX(40px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    textarea {
      resize: vertical;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    /* ── LocalStorage helpers ── */
    const DB = {
      async get(key) {
        try {
          const r = localStorage.getItem(key);
          return r ? JSON.parse(r) : null;
        } catch {
          return null;
        }
      },

      async set(key, value) {
        try {
          localStorage.setItem(key, JSON.stringify(value));
          return true;
        } catch {
          return false;
        }
      },
    };

    /* ── Default users ── */
    const DEFAULT_USERS = [
      {
        id: 'u1',
        username: 'admin',
        password: 'admin123',
        name: 'Admin 管理員',
        role: 'admin',
        color: '#e8c97a',
      },
      {
        id: 'u2',
        username: 'demo',
        password: 'demo123',
        name: 'Demo 用戶',
        role: 'member',
        color: '#6aa0c8',
      },
    ];

    const STATUS = {
      proposal: {
        label: '提案中',
        color: '#6aa0c8',
        bg: 'rgba(106,160,200,0.15)',
        border: 'rgba(106,160,200,0.3)',
      },
      preproduction: {
        label: '前製準備',
        color: '#e89a5a',
        bg: 'rgba(232,154,90,0.15)',
        border: 'rgba(232,154,90,0.3)',
      },
      production: {
        label: '拍攝中',
        color: '#6fb87a',
        bg: 'rgba(111,184,122,0.15)',
        border: 'rgba(111,184,122,0.3)',
      },
      postproduction: {
        label: '後製剪輯',
        color: '#c85c3a',
        bg: 'rgba(200,92,58,0.15)',
        border: 'rgba(200,92,58,0.3)',
      },
      completed: {
        label: '已完成',
        color: '#e8c97a',
        bg: 'rgba(232,201,122,0.15)',
        border: 'rgba(232,201,122,0.3)',
      },
    };

    const S = {
      body: {
        background: '#0d0d0d',
        color: '#e8e4dc',
        fontFamily: "'DM Mono','Noto Serif TC',monospace",
        minHeight: '100vh',
      },

      loginWrap: {
        minHeight: '100vh',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        background:
          'radial-gradient(ellipse at 30% 40%, rgba(232,201,122,0.06) 0%, transparent 60%), #0d0d0d',
      },

      loginBox: {
        width: 420,
        background: '#161616',
        border: '1px solid #2a2a2a',
        borderRadius: 14,
        padding: '40px',
        boxShadow: '0 32px 80px rgba(0,0,0,0.7)',
      },

      input: {
        width: '100%',
        background: '#1e1e1e',
        border: '1px solid #2a2a2a',
        borderRadius: 6,
        padding: '10px 14px',
        fontFamily: 'inherit',
        fontSize: 12,
        color: '#e8e4dc',
        outline: 'none',
      },

      label: {
        display: 'block',
        fontSize: 9,
        letterSpacing: '0.25em',
        textTransform: 'uppercase',
        color: '#7a7670',
        marginBottom: 7,
      },

      btnPrimary: {
        background: '#e8c97a',
        color: '#000',
        border: 'none',
        borderRadius: 5,
        padding: '10px 18px',
        fontFamily: 'inherit',
        fontSize: 11,
        fontWeight: 600,
        cursor: 'pointer',
      },

      card: {
        background: '#161616',
        border: '1px solid #2a2a2a',
        borderRadius: 10,
        overflow: 'hidden',
      },
    };

    function LoginPage({ onLogin }) {
      const [u, setU] = useState('');
      const [p, setP] = useState('');
      const [err, setErr] = useState('');

      const submit = async () => {
        const users = (await DB.get('frame:users')) || DEFAULT_USERS;

        const found = users.find(
          (x) => x.username === u && x.password === p
        );

        if (found) {
          onLogin(found);
        } else {
          setErr('帳號或密碼錯誤');
        }
      };

      return (
        <div style={S.loginWrap}>
          <div style={S.loginBox}>
            <div style={{ textAlign: 'center', marginBottom: 36 }}>
              <div
                style={{
                  fontFamily: "'DM Serif Display',serif",
                  fontSize: 32,
                  letterSpacing: '0.18em',
                  color: '#e8c97a',
                  marginBottom: 6,
                }}
              >
                FRAME
              </div>

              <div
                style={{
                  fontSize: 9,
                  letterSpacing: '0.35em',
                  color: '#7a7670',
                }}
              >
                影片拍攝專案管理系統
              </div>
            </div>

            <div style={{ marginBottom: 18 }}>
              <label style={S.label}>帳號</label>
              <input
                style={S.input}
                value={u}
                onChange={(e) => setU(e.target.value)}
                placeholder="輸入帳號"
              />
            </div>

            <div style={{ marginBottom: 8 }}>
              <label style={S.label}>密碼</label>
              <input
                type="password"
                style={S.input}
                value={p}
                onChange={(e) => setP(e.target.value)}
                placeholder="輸入密碼"
              />
            </div>

            {err && (
              <div
                style={{
                  fontSize: 11,
                  color: '#c85c5c',
                  marginBottom: 12,
                  textAlign: 'center',
                }}
              >
                {err}
              </div>
            )}

            <button
              style={{
                ...S.btnPrimary,
                width: '100%',
                marginTop: 20,
              }}
              onClick={submit}
            >
              登入系統
            </button>
          </div>
        </div>
      );
    }

    function ProjectCard({ project }) {
      const s = STATUS[project.status];

      return (
        <div style={S.card}>
          <div style={{ height: 3, background: s.color }} />

          <div style={{ padding: '16px 18px' }}>
            <div
              style={{
                fontFamily: "'Noto Serif TC',serif",
                fontSize: 14,
                marginBottom: 6,
              }}
            >
              {project.name}
            </div>

            <div style={{ fontSize: 11, color: '#7a7670' }}>
              {project.client}
            </div>

            <div
              style={{
                marginTop: 12,
                display: 'inline-block',
                padding: '4px 10px',
                borderRadius: 4,
                background: s.bg,
                color: s.color,
                border: `1px solid ${s.border}`,
                fontSize: 10,
              }}
            >
              {s.label}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [user, setUser] = useState(null);
      const [projects, setProjects] = useState([]);

      useEffect(() => {
        async function init() {
          const stored = await DB.get('frame:projects');

          if (stored) {
            setProjects(stored);
          } else {
            const demo = getDemoProjects();
            setProjects(demo);
            await DB.set('frame:projects', demo);
          }

          const users = await DB.get('frame:users');

          if (!users) {
            await DB.set('frame:users', DEFAULT_USERS);
          }
        }

        init();
      }, []);

      if (!user) {
        return <LoginPage onLogin={setUser} />;
      }

      return (
        <div style={S.body}>
          <div
            style={{
              padding: '24px 32px',
              borderBottom: '1px solid #2a2a2a',
              display: 'flex',
              justifyContent: 'space-between',
              alignItems: 'center',
            }}
          >
            <div>
              <div
                style={{
                  fontFamily: "'DM Serif Display',serif",
                  fontSize: 24,
                  color: '#e8c97a',
                }}
              >
                FRAME
              </div>

              <div style={{ fontSize: 10, color: '#7a7670' }}>
                影片拍攝專案管理系統
              </div>
            </div>

            <div style={{ fontSize: 12 }}>
              歡迎，{user.name}
            </div>
          </div>

          <div style={{ padding: '28px 32px' }}>
            <div
              style={{
                display: 'grid',
                gridTemplateColumns: 'repeat(auto-fill,minmax(320px,1fr))',
                gap: 18,
              }}
            >
              {projects.map((project) => (
                <ProjectCard key={project.id} project={project} />
              ))}
            </div>
          </div>
        </div>
      );
    }

    function getDemoProjects() {
      return [
        {
          id: 'demo1',
          name: '2025 春季新品廣告',
          type: '廣告影片',
          client: 'LOKA Fashion',
          director: '陳導',
          status: 'production',
        },
        {
          id: 'demo2',
          name: '永續未來 ESG 形象影片',
          type: '品牌影片',
          client: 'GreenTech Corp',
          director: '王導',
          status: 'postproduction',
        },
        {
          id: 'demo3',
          name: '城市邊緣 — 街頭藝術紀錄',
          type: '紀錄片',
          client: '文化部補助',
          director: '張導',
          status: 'preproduction',
        },
      ];
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
